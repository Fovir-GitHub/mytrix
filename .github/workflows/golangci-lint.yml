name: golangci-lint
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: v1.26.1
      - name: Install libolm
        run: sudo apt update && sudo apt install -y libolm-dev
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
