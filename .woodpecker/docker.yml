when:
  - event: push
    branch: main
  - event: tag
    ref: refs/tags/v*
  - event: manual

steps:
  - name: build-and-push
    image: gcr.io/kaniko-project/executor:debug
    environment:
      DOCKER_USERNAME:
        from_secret: DOCKER_USERNAME
      DOCKER_PASSWORD:
        from_secret: DOCKER_PASSWORD
    commands:
      - mkdir -p /kaniko/.docker
      - printf '{"auths":{"https://index.docker.io/v1/":{"auth":"%s"}}}' "$(printf '%s:%s' "$DOCKER_USERNAME" "$DOCKER_PASSWORD" | base64 -w 0)" > /kaniko/.docker/config.json
      - |
        DESTINATIONS="--destination=docker.io/fovir/mytrix:main"
        if [ -n "$CI_COMMIT_TAG" ]; then
          DESTINATIONS="$DESTINATIONS --destination=docker.io/fovir/mytrix:$CI_COMMIT_TAG --destination=docker.io/fovir/mytrix:latest"
        fi
        /kaniko/executor --context=dir://$CI_WORKSPACE --dockerfile=$CI_WORKSPACE/Dockerfile $DESTINATIONS
